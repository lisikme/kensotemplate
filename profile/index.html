    <style>
        /* Дополнительные стили для страницы профиля */
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            /* padding: 20px; */
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            padding: 10px;
            background: #0B0B0B;
            border-bottom: 1px solid #303030;
            /* background: rgba(0, 0, 0, 0.8); */
            border-radius: 5px;
            border: 1px solid #303030;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        
        .avatar-letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #000000, #050031);
            border-radius: 5px;
        }
        
        .profile-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .profile-name {
            font-size: 28px;
            font-weight: bold;
            color: #d7fe7b;
            margin: 0 0 5px 0;
            text-align: center;
        }
        
        .profile-role {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 3px;
            /* text-align: center; */
            
            font-size: 14px;
            font-weight: 500;
            /* margin-bottom: 10px; */
        }
        
        .profile-role.creator {
            background: linear-gradient(45deg, rgb(176, 90, 36), rgb(210, 79, 188));
            color: #ffffff;
        }
        
        .profile-role.bot {
            background: linear-gradient(45deg, rgb(84, 65, 255), rgb(169, 132, 255));
            color: #ffffff;
        }
        
        .profile-role.admin {
            background: linear-gradient(45deg, rgb(0, 99, 16), rgb(0, 146, 32));
            color: #ffffff;
        }
        
        .profile-role.player {
            background: linear-gradient(45deg, rgb(4, 37, 61), rgb(10, 81, 119));
            color: white;
        }
        
        .profile-role.banned {
            background: #ff5757;
            color: white;
        }
        
        .profile-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 0px;
        }
        
        .profile-card {
            background: rgba(14, 14, 14, 0.8);
            border-radius: 5px;
            border: 1px solid #303030;
            padding: 20px;
        }
        
        .profile-card h3 {
            margin-top: 0;
            color: #d7fe7b;
            border-bottom: 1px solid #303030;
            padding-bottom: 10px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #b0b0b0;
        }
        
        .info-value {
            color: #ffffff;
            font-weight: 500;
        }
        
        .subscription-status.active {
            color: #66ff66;
        }
        
        .subscription-status.expired {
            color: #ff5757;
        }
        
        .subscription-status.forever {
            color: #d7fe7b;
        }
        
        .ban-status {
            color: #ff5757;
            font-weight: bold;
        }
        
        .ban-status.permanent {
            color: #ff2d2d;
        }
        
        .ban-status.expired {
            color: #ffa500;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #3278ff;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: #d7fe7b;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #d7fe7b;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ff5757;
        }
        
        .profile-links {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }
        
        .profile-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #222222;
            color: #ffffff;
            padding: 5px 10px;
            border-radius: 3px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .profile-link:hover {
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: #303030;
        }
        
        .profile-link svg {
            width: 16px;
            height: 16px;
            fill: #5662f6;
        }
        
        .telegram-link svg {
            fill: #30a3e6 !important;
        }
        
        .no-link {
            color: #7a7a7a;
            font-size: 14px;
        }
        
        .ban-info-card {
            grid-column: 1 / -1;
            border-color: #ff5757 !important;
        }
        
        .ban-reason {
            background: rgba(255, 87, 87, 0.1);

            border-radius: 3px;
            margin-top: 10px;
            border-left: 3px solid #ff5757;

                grid-template-columns: 1fr;
            }
            
            .ban-info-card {
                grid-column: 1;
            }
        }

// ========== КОМПАКТНЫЙ JS БЕЗ OAuth2 ==========
(() => {
    // Конфигурация
    const CONFIG = {
        jsonUrls: {
            admins: 'https://lisikme.github.io/Nixware-allowed/admins.json',
            hwid: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/hwid4.json',
            temp: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/temps.json',
            discord: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/discords.json',
            bans: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/bans.json'
        }
    };

    // DOM элементы
    const $ = s => document.querySelector(s);
    const btnLogin = $('.btn_login');
    const btnLogout = $('.btn_logout');
    const avatar = $('.avatar');
    const usernameSpan = $('.btn_logout .nav-bt-title');
    const contextMenu = $('.context-menu');
    const overlay = $('.context-menu-overlay');
    const hwidContainer = $('#contextHwidInfo');

    // CookieManager
    const Cookie = {
        get: n => { 
            try { 
                return JSON.parse(document.cookie.split(`; ${n}=`).pop().split(';')[0]); 
            } catch { 
                return null; 
            } 
        },
        delete: n => document.cookie = `${n}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`
    };

    // Утилиты
    const fetchJson = async (url, retries = 3) => {
        for (let i = 0; i < retries; i++) {
            try {
                const res = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`);
                if (!res.ok) throw new Error();
                return await res.json();
            } catch { 
                if (i === retries - 1) return null; 
                await new Promise(r => setTimeout(r, 1000 * (i + 1))); 
            }
        }
    };

    const parseDate = d => d ? Math.floor(new Date(d).getTime() / 1000) : 0;
    const getSubStatus = endTs => {
        if (endTs === 0) return { status: 'forever', text: 'Навсегда', daysLeft: null };
        const days = Math.ceil((endTs - Date.now() / 1000) / 86400);
        return days > 0 ? { status: 'active', text: days <= 7 ? `Осталось ${days} дн.` : 'Активна', daysLeft: days } 
                        : { status: 'expired', text: 'Истекла', daysLeft: 0 };
    };

    const getRole = (discordId, admins, isBanned) => {
        if (isBanned) return 'banned';
        if (discordId === '470573716711931905') return 'creator';
        if (discordId === '1393856315067203635') return 'bot';
        return admins?.includes(discordId) ? 'admin' : 'player';
    };

    const roleNames = { creator: 'Создатель', admin: 'Партнёр', bot: 'Менеджер', player: 'Игрок', banned: 'Забанен' };

    // Состояние
    let currentUser = null;
    let cachedHwidInfo = null;

    // HWID логика
    const loadHwidInfo = async () => {
        if (cachedHwidInfo) return cachedHwidInfo;
        
        let hwid = localStorage.getItem('current_hwid');
        const discordUser = Cookie.get('discord_user');
        
        // Автоматический поиск HWID по Discord ID из cookie
        if (!hwid && discordUser?.id) {
            const discordData = await fetchJson(CONFIG.jsonUrls.discord);
            const entry = discordData?.hwids?.find(e => String(e.DISCORD) === String(discordUser.id));
            if (entry) {
                hwid = entry.HWID;
                localStorage.setItem('current_hwid', hwid);
            }
        }
        
        if (!hwid) return null;
        
        // Загрузка всех данных параллельно
        const [admins, hwidList, temp, bans] = await Promise.all([
            fetchJson(CONFIG.jsonUrls.admins).then(d => d?.Admins || []),
            fetchJson(CONFIG.jsonUrls.hwid).then(d => d?.["users:"] || d?.users || []),
            fetchJson(CONFIG.jsonUrls.temp).then(d => d || {}),
            fetchJson(CONFIG.jsonUrls.bans).then(d => d || {})
        ]);
        
        // Поиск Discord ID для роли
        const discordData = await fetchJson(CONFIG.jsonUrls.discord);
        const userDiscordId = discordData?.hwids?.find(e => e.HWID === hwid)?.DISCORD || null;
        
        // Проверка бана
        const banInfo = bans[hwid];
        const isBanned = banInfo && (banInfo.ban_temp === "-1" || new Date(banInfo.ban_temp) > new Date());
        
        const role = getRole(userDiscordId, admins, isBanned);
        const endTs = parseDate(temp[hwid] || 0);
        const sub = getSubStatus(endTs);
        
        return cachedHwidInfo = { hwid, userDiscordId, endTs, isBanned, role, roleText: roleNames[role], sub, banReason: banInfo?.ban_reason };
    };

    const renderHwidMenu = async () => {
        if (!hwidContainer) return;
        hwidContainer.innerHTML = '<div class="hwid-loading">Загрузка...</div>';
        
        const info = await loadHwidInfo();
        if (!info) {
            hwidContainer.innerHTML = '<div class="hwid-loading"><div style="color:#ff6666;">HWID не привязан</div><div style="font-size:8px;">Войдите в Discord</div></div>';
            return;
        }
        
        const progress = info.endTs === 0 ? 100 : info.sub.daysLeft ? Math.min(100, (info.sub.daysLeft / 30) * 100) : 0;
        
        hwidContainer.innerHTML = `
            <div class="hwid-header"><span>Информация HWID</span>${info.isBanned ? '<span style="color:#ff6666;">BANNED</span>' : ''}</div>
            <div class="hwid-info">
                <div class="hwid-code">${info.hwid}</div>
                <div id="infr">
                    <div class="hwid-status"><span class="label">Статус:</span><span class="value ${info.isBanned ? 'expired' : info.sub.status}">${info.isBanned ? 'Блок' : info.sub.text}</span></div>
                    <div class="hwid-status"><span class="label">Роль:</span><span class="hwid-role ${info.role}">${info.roleText}</span></div>
                </div>
            </div>
            ${!info.isBanned ? `<div class="hwid-expire-bar"><div class="hwid-expire-progress" style="width:${progress}%;"></div></div>` 
                             : `<div class="hwid-status" style="margin-top:5px;"><span class="label">Причина:</span><span class="value" style="font-size:9px;color:#ff8888;">${info.banReason || 'N/A'}</span></div>`}
        `;
    };

    // UI обновление из данных cookie
    const updateUI = () => {
        const user = Cookie.get('discord_user');
        currentUser = user;
        const isAuth = user && user !== 'Гость';
        
        btnLogin?.classList.toggle('active', !isAuth);
        btnLogout?.classList.toggle('active', isAuth);
        
        if (isAuth) {
            avatar.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            avatar.onerror = () => avatar.style.visibility = 'hidden';
            usernameSpan.textContent = user.username;
        } else {
            usernameSpan.textContent = 'Гость';
            avatar.src = '';
        }
        
        // Скрыть/показать кнопку отзыва
        const reviewBtn = document.getElementById('x7k9m2p4_addReviewTrigger_btn');
        if (reviewBtn) reviewBtn.style.display = isAuth ? 'inline-flex' : 'none';
    };

    // Выход из аккаунта
    const logout = () => { 
        Cookie.delete('discord_user'); 
        localStorage.removeItem('current_hwid');
        cachedHwidInfo = null;
        location.reload(); 
    };

    // Глобальные функции
    window.loginWithDiscord = () => window.location.href = window.location.origin + '/auth';
    window.logout = logout;
    
    window.toggleContextMenu = (e) => {
        e?.stopPropagation();
        if (currentUser) {
            contextMenu?.classList.toggle('active');
            overlay?.classList.toggle('active');
        }
    };
    
    window.closeContextMenu = () => {
        contextMenu?.classList.remove('active');
        overlay?.classList.remove('active');
    };
    
    window.openFullProfile = (e) => {
        e?.stopPropagation();
        if (cachedHwidInfo?.hwid) {
            window.location.href = `/profile?hwid=${encodeURIComponent(cachedHwidInfo.hwid)}`;
        }
    };
    
    window.logoutFromMenu = (e) => {
        e?.stopPropagation();
        window.closeContextMenu();
        logout();
    };
    
    window.updateHwidInfoInContextMenu = renderHwidMenu;
    
    // Закрытие меню при клике вне
    document.addEventListener('click', (e) => {
        if (contextMenu?.classList.contains('active') && !btnLogout?.contains(e.target) && !contextMenu.contains(e.target)) {
            window.closeContextMenu();
        }
    });
    
    // Инициализация
    const init = () => {
        updateUI();
        renderHwidMenu();
    };
    
    // Запуск
    document.addEventListener('DOMContentLoaded', init);
})();
</script>

    <div class="profile-container">

            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">

            Назад к списку пользователей
        </a>
        
        <div id="profileContent">
            <div class="loading">
                <p>Загрузка данных профиля...</p>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация
        const config = {
            adminsJsonUrl: 'https://lisikme.github.io/Nixware-allowed/admins.json',
            hwidJsonUrl: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/hwid4.json',
            tempJsonUrl: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/temps.json',
            discordJsonUrl: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/discords.json',
            telegramJsonUrl: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/telegrams.json',
            bansJsonUrl: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/bans.json',
            discordApiBase: 'https://dis-api.sakuri.ru/api/discord',
            proxy: 'https://proxy.sakuri.ru/api/proxy?url='
        };
        
        // Кэш для данных Discord (1 час)
        const CACHE_DURATION = 60 * 60 * 1000; // 1 час
        const DISCORD_DATA_CACHE_KEY = 'discord_users_batch_cache_profile';
        
        // Хранилище для данных пользователей Discord
        let batchUserData = null;
        const avatarQueue = [];
        let isProcessingQueue = false;
        
        function addCacheBuster(url) {
            return url + (url.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
        }
        
        async function fetchWithRetry(url, options = {}, retries = 3, delay = 1000) {
            try {
                const cacheBustedUrl = addCacheBuster(url);
                const response = await fetch(cacheBustedUrl, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retries > 0) {
                    console.log(`Повторная попытка загрузки (${4-retries}/${3}): ${url}`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return fetchWithRetry(url, options, retries - 1, delay * 2);
                }
                throw error;
            }
        }
        
        // Функция для получения данных пользователей Discord через batch-запрос
        async function fetchBatchDiscordUsers(discordIds) {
            if (!discordIds || discordIds.length === 0) return {};
            
            const uniqueIds = [...new Set(discordIds.filter(id => id && id !== 'null'))];
            if (uniqueIds.length === 0) return {};
            
            // Проверяем кэш
            const cachedData = getCachedDiscordData();
            if (cachedData) {
                console.log('Используем кэшированные данные Discord для профиля');
                return cachedData;
            }
            
            console.log(`Загружаем данные для ${uniqueIds.length} пользователей Discord (profile)`);
            
            // Пробуем сначала без прокси
            let response = null;
            
            try {
                const url = `${config.discordApiBase}/users`;
                const directResponse = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ids: uniqueIds })
                });
                
                if (directResponse.ok) {
                    response = await directResponse.json();
                } else {
                    throw new Error(`HTTP ${directResponse.status}`);
                }
            } catch (error) {
                console.warn('Прямой запрос не удался, используем прокси:', error.message);
                
                try {
                    const proxyUrl = `${config.proxy}"${encodeURIComponent(`${config.discordApiBase}/users`)}"`;
                    const proxyResponse = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ ids: uniqueIds })
                    });
                    
                    if (proxyResponse.ok) {
                        response = await proxyResponse.json();
                    } else {
                        throw new Error(`Proxy HTTP ${proxyResponse.status}`);
                    }
                } catch (proxyError) {
                    console.error('Ошибка при запросе через прокси:', proxyError);
                    return {};
                }
            }
            
            // Обрабатываем ответ
            const userDataMap = {};
            
            if (response && response.results) {
                for (const result of response.results) {
                    if (result.success && result.data) {
                        const userId = result.user_id || result.data.id;
                        userDataMap[userId] = {
                            username: result.data.username,
                            global_name: result.data.global_name,
                            discriminator: result.data.discriminator,
                            avatar: result.data.avatar,
                            avatar_url: result.data.avatar_url,
                            bot: result.data.bot || false
                        };
                    }
                }
            }
            
            // Сохраняем в кэш
            saveCachedDiscordData(userDataMap);
            
            return userDataMap;
        }
        
        // Сохранение данных Discord в кэш
        function saveCachedDiscordData(data) {
            const cacheData = {
                timestamp: Date.now(),
                data: data
            };
            localStorage.setItem(DISCORD_DATA_CACHE_KEY, JSON.stringify(cacheData));
        }
        
        // Получение данных из кэша
        function getCachedDiscordData() {
            const cached = localStorage.getItem(DISCORD_DATA_CACHE_KEY);
            if (!cached) return null;
            
            try {
                const cacheData = JSON.parse(cached);
                const now = Date.now();
                
                if (now - cacheData.timestamp < CACHE_DURATION) {
                    return cacheData.data;
                }
            } catch (e) {
                console.warn('Ошибка чтения кэша:', e);
            }
            
            return null;
        }
        
        // Функция для получения аватарки из кэша или batch данных
        function getDiscordAvatar(discordId) {
            if (!discordId) return null;
            
            // Проверяем кэш аватарок
            const cachedAvatar = localStorage.getItem(`avatar_profile_${discordId}`);
            if (cachedAvatar) return cachedAvatar;
            
            // Проверяем batch данные
            if (batchUserData && batchUserData[discordId]) {
                const userData = batchUserData[discordId];
                if (userData.avatar_url) return userData.avatar_url;
                if (userData.avatar) {
                    return `https://cdn.discordapp.com/avatars/${discordId}/${userData.avatar}.png?size=256`;
                }
            }
            
            return null;
        }
        
        // Функция для получения имени пользователя из batch данных
        function getDiscordUsername(discordId, fallbackName) {
            if (!discordId) return fallbackName;
            
            // Проверяем кэш localStorage
            const cachedName = localStorage.getItem(`discord_name_profile_${discordId}`);
            if (cachedName && cachedName !== 'undefined') {
                return cachedName;
            }
            
            // Проверяем batch данные
            if (batchUserData && batchUserData[discordId]) {
                const userData = batchUserData[discordId];
                let displayName = fallbackName;
                
                if (userData.username) {
                    displayName = userData.username;
                    if (userData.discriminator && userData.discriminator !== '0') {
                        displayName = `${userData.username}#${userData.discriminator}`;
                    }
                } else if (userData.global_name) {
                    displayName = userData.global_name;
                }
                
                localStorage.setItem(`discord_name_profile_${discordId}`, displayName);
                return displayName;
            }
            
            return fallbackName;
        }
        
        // Последовательная загрузка аватаров
        async function loadAvatarSequentially(discordId, imgElement, avatarUrl) {
            return new Promise((resolve) => {
                const task = async () => {
                    try {
                        if (!avatarUrl) {
                            resolve(null);
                            return;
                        }
                        
                        // Пробуем загрузить напрямую
                        try {
                            await tryLoadImage(avatarUrl, 5000);
                            if (imgElement) {
                                imgElement.src = avatarUrl;
                                imgElement.style.opacity = '1';
                                localStorage.setItem(`avatar_profile_${discordId}`, avatarUrl);
                            }
                            resolve(avatarUrl);
                            return;
                        } catch (directError) {
                            // Пробуем через прокси
                            try {
                                const proxyUrl = `${config.proxy}"${encodeURIComponent(avatarUrl)}"`;
                                await tryLoadImage(proxyUrl, 5000);
                                if (imgElement) {
                                    imgElement.src = proxyUrl;
                                    imgElement.style.opacity = '1';
                                    localStorage.setItem(`avatar_profile_${discordId}`, proxyUrl);
                                }
                                resolve(proxyUrl);
                                return;
                            } catch (proxyError) {
                                console.warn(`Не удалось загрузить аватар для ${discordId}`);
                                if (imgElement) {
                                    imgElement.style.opacity = '1';
                                }
                                resolve(null);
                            }
                        }
                    } catch (error) {
                        console.warn(`Ошибка загрузки аватара для ${discordId}:`, error.message);
                        if (imgElement) {
                            imgElement.style.opacity = '1';
                        }
                        resolve(null);
                    }
                };
                
                avatarQueue.push(task);
                processAvatarQueue();
            });
        }
        
        function processAvatarQueue() {
            if (isProcessingQueue || avatarQueue.length === 0) return;
            
            isProcessingQueue = true;
            
            const processNext = async () => {
                if (avatarQueue.length === 0) {
                    isProcessingQueue = false;
                    return;
                }
                
                const task = avatarQueue.shift();
                await task();
                
                // Задержка между загрузками для визуальной плавности
                setTimeout(processNext, 200);
            };
            
            processNext();
        }
        
        function tryLoadImage(url, timeoutMs) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const timeout = setTimeout(() => {
                    cleanup();
                    reject(new Error(`Таймаут ${timeoutMs}ms`));
                }, timeoutMs);
                
                function cleanup() {
                    clearTimeout(timeout);
                    img.onload = null;
                    img.onerror = null;
                }
                
                img.onload = () => { cleanup(); resolve(url); };
                img.onerror = () => { cleanup(); reject(new Error('Ошибка загрузки')); };
                img.src = url.includes('?') ? `${url}&_=${Date.now()}` : `${url}?_=${Date.now()}`;
            });
        }
        
        function getUserRole(discordId, adminList) {
            if (discordId === '470573716711931905') {
                return 'creator'; 
            }
            if (discordId === '1393856315067203635') {
                return 'bot'; 
            }
            return adminList.includes(discordId) ? 'admin' : 'player';
        }
        
        async function fetchJsonData(url) {
            try {
                return await fetchWithRetry(url);
            } catch (error) {
                console.error(`Ошибка загрузки данных из ${url}:`, error);
                return null;
            }
        }
        
        function parseDateToTimestamp(dateString) {
            try {
                if (typeof dateString === 'number') {
                    return dateString;
                }
                if (dateString && dateString.includes('T')) {
                    return Math.floor(new Date(dateString).getTime() / 1000);
                } else if (dateString) {
                    return Math.floor(new Date(dateString).getTime() / 1000);
                }
                return 0;
            } catch (e) {
                return 0;
            }
        }
        
        function formatDate(timestamp) {
            if (timestamp === 0) return 'Навсегда';
            const date = new Date(timestamp * 1000);
            return `До ${date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'})}`;
        }
        
        function getSubscriptionStatus(endTime) {
            if (endTime === 0) return { status: 'forever', text: 'Безлимит' };
            const now = Math.floor(Date.now() / 1000);
            if (endTime > now) {
                const daysLeft = Math.ceil((endTime - now) / (60 * 60 * 24));
                return { status: 'active', text: `${daysLeft} дн.` };
            } else {
                return { status: 'expired', text: 'Истекла' };
            }
        }
        
        function getBanStatus(userHwid, bansData) {
            if (!bansData || typeof bansData !== 'object') return null;
            
            const banInfo = bansData[userHwid];
            if (!banInfo) return null;
            
            const now = new Date();
            const banTime = new Date(banInfo.ban_time);
            const banTemp = banInfo.ban_temp;
            
            if (banTemp === "-1") {
                return {
                    isBanned: true,
                    isPermanent: true,
                    reason: banInfo.ban_reason || 'Причина не указана',
                    banTime: banTime,
                    remainingTime: null
                };
            }
            
            const banEnd = new Date(banTemp);
            if (banEnd > now) {
                const remainingDays = Math.ceil((banEnd - now) / (1000 * 60 * 60 * 24));
                return {
                    isBanned: true,
                    isPermanent: false,
                    reason: banInfo.ban_reason || 'Причина не указана',
                    banTime: banTime,
                    banEnd: banEnd,
                    remainingTime: remainingDays
                };
            } else {
                return {
                    isBanned: false,
                    wasBanned: true,
                    reason: banInfo.ban_reason,
                    banTime: banTime,
                    banEnd: banEnd
                };
            }
        }
        
        function formatBanDate(date) {
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function getDiscordIdByHwid(hwid, discordData) {
            if (discordData.hwids && Array.isArray(discordData.hwids)) {
                const entry = discordData.hwids.find(e => e.HWID === hwid);
                return entry ? `${entry.DISCORD}` : null;
            }
            return null;
        }
        
        function getTelegramIdByHwid(hwid, telegramData) {
            if (telegramData.bindings && Array.isArray(telegramData.bindings)) {
                const entry = telegramData.bindings.find(e => e.HWID === hwid);
                return entry ? `${entry.TELEGRAM}` : null;
            }
            return null;
        }
        
        async function displayProfile(userData, banStatus) {
            const profileContent = document.getElementById('profileContent');
            
            if (!userData) {
                profileContent.innerHTML = `
                    <div class="error">
                        <p>Пользователь не найден</p>
                        <p>Проверьте правильность HWID в URL</p>
                    </div>
                `;
                return;
            }
            
            const subscriptionStatus = getSubscriptionStatus(userData.end);
            const discordUsername = userData.discordId ? getDiscordUsername(userData.discordId, userData.name) : null;
            
            let userRole = userData.role;
            let roleText = userRole === 'creator' ? 'Создатель' : 
                userRole === 'admin' ? 'Партнёр' : 
                userRole === 'bot' ? 'Служба' : 
                userRole === 'banned' ? 'Забанен' : 'Игрок';
            
            const roleClass = `profile-role ${userRole === 'banned' ? 'banned' : userRole}`;
            
            // Получаем URL аватарки
            const avatarUrl = userData.discordId ? getDiscordAvatar(userData.discordId) : null;
            
            profileContent.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">
                        ${avatarUrl ? 
                            `<img src="${avatarUrl}" alt="${userData.name}" id="profileAvatar" style="opacity: 0;">` : 
                            `<div class="avatar-letter">${userData.name.charAt(0).toUpperCase()}</div>`
                        }
                    </div>
                    <div class="profile-info">
                        <h1 class="profile-name">${userData.name}</h1>
                        <div class="${roleClass}">${roleText}</div>
                        <div class="profile-links">
                            ${userData.discordId ? 
                                `<a href="https://discord.com/users/${userData.discordId}" target="_blank" class="profile-link">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M14.82 4.26a10.14 10.14 0 0 0-.53 1.1 14.66 14.66 0 0 0-4.58 0 10.14 10.14 0 0 0-.53-1.1 16 16 0 0 0-4.13 1.3 17.33 17.33 0 0 0-3 11.59 16.6 16.6 0 0 0 5.07 2.59A12.89 12.89 0 0 0 8.23 18a9.65 9.65 0 0 1-1.71-.83 3.39 3.39 0 0 0 .42-.33 11.66 11.66 0 0 0 10.12 0c.14.09.28.19.42.33a10.14 10.14 0 0 1-1.71.83 12.89 12.89 0 0 0 1.08 1.78 16.44 16.44 0 0 0 5.06-2.59 17.22 17.22 0 0 0-3-11.59 16.09 16.09 0 0 0-4.09-1.35zM8.68 14.81a1.94 1.94 0 0 1-1.8-2 1.93 1.93 0 0 1 1.8-2 1.93 1.93 0 0 1 1.8 2 1.93 1.93 0 0 1-1.8 2zm6.64 0a1.94 1.94 0 0 1-1.8-2 1.93 1.93 0 0 1 1.8-2 1.92 1.92 0 0 1 1.8 2 1.92 1.92 0 0 1-1.8 2z"/>
                                    </svg>
                                    <span>${discordUsername || 'Discord'}</span>
                                </a>` : 
                                ''
                            }
                            ${userData.telegramId ? 
                                `<a href="#" class="profile-link telegram-link">
                                    <svg viewBox="0 0 100 100">
                                        <path d="M89.442 11.418c-12.533 5.19-66.27 27.449-81.118 33.516-9.958 3.886-4.129 7.529-4.129 7.529s8.5 2.914 15.786 5.1 11.172-.243 11.172-.243l34.244-23.073c12.143-8.257 9.229-1.457 6.315 1.457-6.315 6.315-16.758 16.272-25.501 24.287-3.886 3.4-1.943 6.315-.243 7.772 6.315 5.343 23.558 16.272 24.53 17.001 5.131 3.632 15.223 8.861 16.758-2.186l6.072-38.13c1.943-12.872 3.886-24.773 4.129-28.173.728-8.257-8.015-4.857-8.015-4.857z"></path>
                                    </svg>
                                    <span>ID: ${userData.telegramId}</span>
                                </a>` : 
                                ''
                            }
                            ${!userData.discordId && !userData.telegramId ? 
                                `<span class="no-link">Без привязки</span>` : 
                                ''
                            }
                        </div>
                    </div>
                </div>
                
                <div class="profile-details">
                    ${banStatus && banStatus.isBanned ? `
                    <div class="profile-card ban-info-card">
                        <h3>Информация о блокировке</h3>
                        ${!banStatus.isPermanent ? `
                        <div class="info-row">
                            <span class="info-label">До окончания:</span>
                            <span class="info-value subscription-status active">${banStatus.remainingTime} дн.</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Срок блокировки:</span>
                            <span class="info-value">До ${formatBanDate(banStatus.banEnd)}</span>
                        </div>
                        ` : `
                        <div class="info-row">
                            <span class="info-label">До окончания:</span>
                            <span class="info-value subscription-status forever">Безлимит</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Срок блокировки:</span>
                            <span class="info-value">Навсегда</span>
                        </div>
                        `}
                        <div class="ban-reason">
                            <strong style='color: #ff6666'>Причина:</strong><br>${banStatus.reason}
                        </div>
                    </div>
                    ` : ''}
                    
                    ${banStatus && banStatus.wasBanned ? `
                    <div class="profile-card ban-info-card">
                        <h3>ℹ️ История блокировок</h3>
                        <div class="info-row">
                            <span class="info-label">Статус:</span>
                            <span class="info-value ban-status expired">Блокировка истекла</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Дата блокировки:</span>
                            <span class="info-value">${formatBanDate(banStatus.banTime)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Дата окончания:</span>
                            <span class="info-value">${formatBanDate(banStatus.banEnd)}</span>
                        </div>
                        <div class="ban-reason">
                            <strong>Причина:</strong> ${banStatus.reason}
                        </div>
                    </div>
                    ` : ''}
                    
                    <div class="profile-card">
                        <h3>Основная информация</h3>
                        <div class="info-row">
                            <span class="info-label">HWID:</span>
                            <span class="info-value">${userData.hwid}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Статус:</span>
                            <span class="info-value">${userData.group_id}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">До окончания:</span>
                            <span class="info-value subscription-status ${subscriptionStatus.status}">${subscriptionStatus.text}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Срок подписки:</span>
                            <span class="info-value">${formatDate(userData.end)}</span>
                        </div>
                    </div>
                    
                    <div class="profile-card">
                        <h3>Привязки аккаунтов</h3>
                        <div class="info-row">
                            <span class="info-label">Discord ID:</span>
                            <span class="info-value">${userData.discordId || 'Не привязан'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Telegram ID:</span>
                            <span class="info-value">${userData.telegramId || 'Не привязан'}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // Загружаем аватар последовательно
            if (userData.discordId && avatarUrl) {
                const avatarElement = document.getElementById('profileAvatar');
                if (avatarElement) {
                    loadAvatarSequentially(userData.discordId, avatarElement, avatarUrl);
                }
            } else if (userData.discordId && !avatarUrl && batchUserData && batchUserData[userData.discordId]) {
                // Если аватар не был получен из кэша, пробуем загрузить через API
                const userDiscordData = batchUserData[userData.discordId];
                if (userDiscordData && userDiscordData.avatar) {
                    const fullAvatarUrl = `https://cdn.discordapp.com/avatars/${userData.discordId}/${userDiscordData.avatar}.png?size=256`;
                    const avatarElement = document.getElementById('profileAvatar');
                    if (avatarElement) {
                        loadAvatarSequentially(userData.discordId, avatarElement, fullAvatarUrl);
                    }
                }
            }
        }
        
        async function loadProfileData() {
            const urlParams = new URLSearchParams(window.location.search);
            const hwid = urlParams.get('hwid');
            
            if (!hwid) {
                displayProfile(null);
                return;
            }
            
            try {
                const [adminsData, hwidData, tempData, discordData, telegramData, bansData] = await Promise.allSettled([
                    fetchJsonData(config.adminsJsonUrl),
                    fetchJsonData(config.hwidJsonUrl),
                    fetchJsonData(config.tempJsonUrl),
                    fetchJsonData(config.discordJsonUrl),
                    fetchJsonData(config.telegramJsonUrl),
                    fetchJsonData(config.bansJsonUrl)
                ]);
                
                const admins = adminsData.status === 'fulfilled' ? adminsData.value : { "Admins": [] };
                const hwidList = hwidData.status === 'fulfilled' ? hwidData.value : { "users:": [] };
                const temp = tempData.status === 'fulfilled' ? tempData.value : {};
                const discord = discordData.status === 'fulfilled' ? discordData.value : { "hwids": [] };
                const telegram = telegramData.status === 'fulfilled' ? telegramData.value : { "bindings": [] };
                const bans = bansData.status === 'fulfilled' ? bansData.value : {};
                
                const adminDiscordIds = admins.Admins || [];
                
                const activeUsers = hwidList["users:"] || hwidList.users || [];
                const userIndex = activeUsers.findIndex(username => username === hwid);
                const banStatus = getBanStatus(hwid, bans);
                
                let userData;
                let discordId = null;
                let telegramId = null;
                
                if (userIndex !== -1) {
                    const username = activeUsers[userIndex];
                    discordId = getDiscordIdByHwid(username, discord);
                    telegramId = getTelegramIdByHwid(username, telegram);
                    const endTime = temp[username] || 0;
                    
                    userData = {
                        id: userIndex + 1,
                        hwid: username,
                        name: username,
                        discordId: discordId,
                        telegramId: telegramId,
                        end: parseDateToTimestamp(endTime),
                        group_id: 'Активная подписка',
                        flags: '999',
                        immunity: 0,
                        role: getUserRole(discordId, adminDiscordIds)
                    };
                } else if (banStatus && banStatus.isBanned) {
                    discordId = getDiscordIdByHwid(hwid, discord);
                    telegramId = getTelegramIdByHwid(hwid, telegram);
                    
                    userData = {
                        id: 0,
                        hwid: hwid,
                        name: hwid,
                        discordId: discordId,
                        telegramId: telegramId,
                        end: 0,
                        group_id: 'Забанен',
                        flags: '0',
                        immunity: 0,
                        role: 'banned'
                    };
                } else {
                    displayProfile(null);
                    return;
                }
                
                // Загружаем данные Discord через batch-запрос, если есть ID
                if (discordId) {
                    const discordIdsToFetch = [discordId];
                    batchUserData = await fetchBatchDiscordUsers(discordIdsToFetch);
                }
                
                displayProfile(userData, banStatus);
                
            } catch (error) {
                console.error('Ошибка загрузки данных профиля:', error);
                document.getElementById('profileContent').innerHTML = `
                    <div class="error">
                        <p>Ошибка загрузки данных профиля</p>
                        <p>Попробуйте обновить страницу</p>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProfileData();
        });
    </script>
</body>
