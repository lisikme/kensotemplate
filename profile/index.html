        /* Дополнительные стили для страницы профиля */
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            /* padding: 20px; */
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            padding: 10px;
            background: #0B0B0B;
            border-bottom: 1px solid #303030;
            /* background: rgba(0, 0, 0, 0.8); */
            border-radius: 5px;
            border: 1px solid #303030;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        
        .avatar-letter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #000000, #050031);
            border-radius: 5px;
        }
        
        .profile-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .profile-name {
            font-size: 28px;
            font-weight: bold;
            color: #d7fe7b;
            margin: 0 0 5px 0;
            text-align: center;
        }
        
        .profile-role {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 3px;
            /* text-align: center; */
            
            font-size: 14px;
            font-weight: 500;
            /* margin-bottom: 10px; */
        }
        
        .profile-role.creator {
            background: linear-gradient(45deg, rgb(176, 90, 36), rgb(210, 79, 188));
            color: #ffffff;
        }
        
        .profile-role.bot {
            background: linear-gradient(45deg, rgb(84, 65, 255), rgb(169, 132, 255));
            color: #ffffff;
        }
        
        .profile-role.admin {

            color: #ffffff;
        }

        }
        
        .profile-role.banned {

        }

        .profile-card {

        }
        
        .info-value {

        }

        <script>
// ========== КОМПАКТНЫЙ JS БЕЗ OAuth2 ==========
(() => {
    // Конфигурация
    const CONFIG = {
        jsonUrls: {
            admins: 'https://lisikme.github.io/Nixware-allowed/admins.json',
            hwid: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/hwid4.json',
            temp: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/temps.json',
            discord: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/discords.json',
            bans: 'https://raw.githubusercontent.com/lisikme/Nixware-allowed/main/bans.json'
        }
    };

    // DOM элементы
    const $ = s => document.querySelector(s);
    const btnLogin = $('.btn_login');
    const btnLogout = $('.btn_logout');
    const avatar = $('.avatar');
    const usernameSpan = $('.btn_logout .nav-bt-title');
    const contextMenu = $('.context-menu');
    const overlay = $('.context-menu-overlay');
    const hwidContainer = $('#contextHwidInfo');

    // CookieManager
    const Cookie = {
        get: n => { 
            try { 
                return JSON.parse(document.cookie.split(`; ${n}=`).pop().split(';')[0]); 
            } catch { 
                return null; 
            } 
        },
        delete: n => document.cookie = `${n}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/`
    };

    // Утилиты
    const fetchJson = async (url, retries = 3) => {
        for (let i = 0; i < retries; i++) {
            try {
                const res = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`);
                if (!res.ok) throw new Error();
                return await res.json();
            } catch { 
                if (i === retries - 1) return null; 
                await new Promise(r => setTimeout(r, 1000 * (i + 1))); 
            }
        }
    };

    const parseDate = d => d ? Math.floor(new Date(d).getTime() / 1000) : 0;
    const getSubStatus = endTs => {
        if (endTs === 0) return { status: 'forever', text: 'Навсегда', daysLeft: null };
        const days = Math.ceil((endTs - Date.now() / 1000) / 86400);
        return days > 0 ? { status: 'active', text: days <= 7 ? `Осталось ${days} дн.` : 'Активна', daysLeft: days } 
                        : { status: 'expired', text: 'Истекла', daysLeft: 0 };
    };

    const getRole = (discordId, admins, isBanned) => {
        if (isBanned) return 'banned';
        if (discordId === '470573716711931905') return 'creator';
        if (discordId === '1393856315067203635') return 'bot';
        return admins?.includes(discordId) ? 'admin' : 'player';
    };

    const roleNames = { creator: 'Создатель', admin: 'Партнёр', bot: 'Менеджер', player: 'Игрок', banned: 'Забанен' };

    // Состояние
    let currentUser = null;
    let cachedHwidInfo = null;

    // HWID логика
    const loadHwidInfo = async () => {
        if (cachedHwidInfo) return cachedHwidInfo;
        
        let hwid = localStorage.getItem('current_hwid');
        const discordUser = Cookie.get('discord_user');
        
        // Автоматический поиск HWID по Discord ID из cookie
        if (!hwid && discordUser?.id) {
            const discordData = await fetchJson(CONFIG.jsonUrls.discord);
            const entry = discordData?.hwids?.find(e => String(e.DISCORD) === String(discordUser.id));
            if (entry) {
                hwid = entry.HWID;
                localStorage.setItem('current_hwid', hwid);
            }
        }
        
        if (!hwid) return null;
        
        // Загрузка всех данных параллельно
        const [admins, hwidList, temp, bans] = await Promise.all([
            fetchJson(CONFIG.jsonUrls.admins).then(d => d?.Admins || []),
            fetchJson(CONFIG.jsonUrls.hwid).then(d => d?.["users:"] || d?.users || []),
            fetchJson(CONFIG.jsonUrls.temp).then(d => d || {}),
            fetchJson(CONFIG.jsonUrls.bans).then(d => d || {})
        ]);
        
        // Поиск Discord ID для роли
        const discordData = await fetchJson(CONFIG.jsonUrls.discord);
        const userDiscordId = discordData?.hwids?.find(e => e.HWID === hwid)?.DISCORD || null;
        
        // Проверка бана
        const banInfo = bans[hwid];
        const isBanned = banInfo && (banInfo.ban_temp === "-1" || new Date(banInfo.ban_temp) > new Date());
        
        const role = getRole(userDiscordId, admins, isBanned);
        const endTs = parseDate(temp[hwid] || 0);
        const sub = getSubStatus(endTs);
        
        return cachedHwidInfo = { hwid, userDiscordId, endTs, isBanned, role, roleText: roleNames[role], sub, banReason: banInfo?.ban_reason };
    };

    const renderHwidMenu = async () => {
        if (!hwidContainer) return;
        hwidContainer.innerHTML = '<div class="hwid-loading">Загрузка...</div>';
        
        const info = await loadHwidInfo();
        if (!info) {
            hwidContainer.innerHTML = '<div class="hwid-loading"><div style="color:#ff6666;">HWID не привязан</div><div style="font-size:8px;">Войдите в Discord</div></div>';
            return;
        }
        
        const progress = info.endTs === 0 ? 100 : info.sub.daysLeft ? Math.min(100, (info.sub.daysLeft / 30) * 100) : 0;
        
        hwidContainer.innerHTML = `
            <div class="hwid-header"><span>Информация HWID</span>${info.isBanned ? '<span style="color:#ff6666;">BANNED</span>' : ''}</div>
            <div class="hwid-info">
                <div class="hwid-code">${info.hwid}</div>
                <div id="infr">
                    <div class="hwid-status"><span class="label">Статус:</span><span class="value ${info.isBanned ? 'expired' : info.sub.status}">${info.isBanned ? 'Блок' : info.sub.text}</span></div>
                    <div class="hwid-status"><span class="label">Роль:</span><span class="hwid-role ${info.role}">${info.roleText}</span></div>
                </div>
            </div>
            ${!info.isBanned ? `<div class="hwid-expire-bar"><div class="hwid-expire-progress" style="width:${progress}%;"></div></div>` 
                             : `<div class="hwid-status" style="margin-top:5px;"><span class="label">Причина:</span><span class="value" style="font-size:9px;color:#ff8888;">${info.banReason || 'N/A'}</span></div>`}
        `;
    };

    // UI обновление из данных cookie
    const updateUI = () => {
        const user = Cookie.get('discord_user');
        currentUser = user;
        const isAuth = user && user !== 'Гость';
        
        btnLogin?.classList.toggle('active', !isAuth);
        btnLogout?.classList.toggle('active', isAuth);
        
        if (isAuth) {
            avatar.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            avatar.onerror = () => avatar.style.visibility = 'hidden';
            usernameSpan.textContent = user.username;
        } else {
            usernameSpan.textContent = 'Гость';
            avatar.src = '';
        }
        
        // Скрыть/показать кнопку отзыва
        const reviewBtn = document.getElementById('x7k9m2p4_addReviewTrigger_btn');
        if (reviewBtn) reviewBtn.style.display = isAuth ? 'inline-flex' : 'none';
    };

    // Выход из аккаунта
    const logout = () => { 
        Cookie.delete('discord_user'); 
        localStorage.removeItem('current_hwid');
        cachedHwidInfo = null;
        location.reload(); 
    };

    // Глобальные функции
    window.loginWithDiscord = () => window.location.href = window.location.origin + '/auth';
    window.logout = logout;
    
    window.toggleContextMenu = (e) => {
        e?.stopPropagation();
        if (currentUser) {
            contextMenu?.classList.toggle('active');
            overlay?.classList.toggle('active');
        }
    };
    
    window.closeContextMenu = () => {
        contextMenu?.classList.remove('active');
        overlay?.classList.remove('active');
    };
    
    window.openFullProfile = (e) => {
        e?.stopPropagation();
        if (cachedHwidInfo?.hwid) {
            window.location.href = `/profile?hwid=${encodeURIComponent(cachedHwidInfo.hwid)}`;
        }
    };
    
    window.logoutFromMenu = (e) => {
        e?.stopPropagation();
        window.closeContextMenu();
        logout();
    };
    
    window.updateHwidInfoInContextMenu = renderHwidMenu;
    
    // Закрытие меню при клике вне
    document.addEventListener('click', (e) => {
        if (contextMenu?.classList.contains('active') && !btnLogout?.contains(e.target) && !contextMenu.contains(e.target)) {
            window.closeContextMenu();
        }
    });
    
    // Инициализация
    const init = () => {
        updateUI();
        renderHwidMenu();
    };
    
    // Запуск
    document.addEventListener('DOMContentLoaded', init);
})();
</script>
