        /* KetaRu ScrollBars */
        :root{
            --Background: #0f0f0f;
            --Fon: #0d1218;
            --ColorNone: #d7fe7b;
            --ColorCursor: #95b940;
            --Width: 2px;
            --Border: 2px;
            --Radius: 0px;
        } 
        /* Дизайн скрол-бара */
        .element::-webkit-scrollbar{
            background-color: var(--Background);
            width: 0;
        }
        ::-webkit-scrollbar{
            width: var(--Width);
            height: 7px;
            background-color: var(--Background);
        }
        ::-webkit-scrollbar-thumb{
            background-color: var(--ColorNone);
            border-radius: var(--Radius);
            min-height: 30px;
            width: var(--Width);
            border: var(--Border) solid var(--Background);
        }
        ::-webkit-scrollbar-thumb:hover{
            background-color: var(--ColorCursor);
        }

a {

        /* Основной контент */
        .payment-container {

            background: #0e0e0e;
            padding: 20px;
            border-radius: 5px;
            border: #575757 solid 1px;

            font-size: 13px;
        }

        /* Сетка кнопок - как adminlist_blocks */
        .price-buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 5px;
            margin-bottom: 30px;
        }

        /* Стиль кнопки как карточка */
        .price-card {
            background: #010101;
            border: 1px solid #303030;
            border-radius: 5px;
            padding: 5px 0px;
            min-height: 58px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-family: "Unbounded", sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .price-card:hover {
            border-color: #d7fe7b;
            background: #222222;
        }

        .price-card.active {
            border: 1px solid #d7fe7b;
            background: linear-gradient(135deg, rgba(50, 120, 255, 0.2), rgba(106, 17, 203, 0.2));
            box-shadow: 0 0 15px rgba(50, 120, 255, 0.2);
        }

        .price-card.active::before {
            content: '✓';
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: #d7fe7b;
            color: #0e0e0e;
            font-size: 12px;
            font-weight: bold;
            width: 15px;
            height: 15px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Стили для цены со скидкой в карточке */
        .price-amount {
            font-size: 18px;
            font-weight: bold;
            color: #d7fe7b;
        }
        
        .price-amount-with-discount {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .price-old {
            font-size: 12px;
            color: #888;
            text-decoration: line-through;
        }
        
        .price-new {
            font-size: 18px;
            font-weight: bold;
            color: #d7fe7b;
        }
        
        .discount-tag {
            background: #ff4444;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 5px;
            display: inline-block;
        }

        .price-term {

            color: #90ffff;
            opacity: 0.9;
        }

        /* ========= НОВЫЙ БЛОК: СПОСОБЫ ОПЛАТЫ ========= */
        .payment-methods-section {
            background: #0a0a0a;
            border-radius: 5px;
            padding: 10px 15px 15px 15px;

            border: 1px solid #2a2a2a;

        .methods-grid {

        }
        
        .method-card {

            border: 1px solid #333;
            border-radius: 5px;
            padding: 12px 24px;

            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 160px;
            justify-content: center;
            position: relative;
        }
        
        .method-card:hover:not(.disabled-method) {
            border-color: #d7fe7b;
            background: #1f1f1f;
        }
        
        .method-card.active-method {
            border: 1px solid #d7fe7b;
            background: #202020;
        }
        
        .method-card.active-method::after {
            content: '✓';
            position: absolute;
            bottom: 3px;
            right: 3px;
            background: #d7fe7b;
            color: #0e0e0e;
            font-size: 12px;
            font-weight: bold;

            height: 15px;
            border-radius: 3px;

            align-items: center;
            justify-content: center;
        }
        
        .method-icon {

            border-radius: 6px;
        }
        
        .method-name {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.3px;
        }
        
        .disabled-method>img {
            filter: grayscale(0.7);
        }
        .disabled-method {
            cursor: not-allowed;
            /* filter: grayscale(1); */
            position: relative;
            /* overflow: hidden; */
            background: rgb(8, 8, 8);
            border-color: #303030;
        }
        
        .disabled-method::after {
            content: 'СКОРО';
            background: #3b3b3b;
            color: white;
            font-size: 10px;
            position: absolute;
            right: -3px;
            top: -3px;
            font-weight: bold;
            font-weight: 500;
            padding: 2px 5px;
            border-radius: 3px;
            /* margin-left: 8px; */
            white-space: nowrap;
        }
        
        .method-status {
            font-size: 11px;
            color: #ff8888;
            margin-left: 6px;
        }
        
        /* обновленная плашка после оплаты (две строки) */

            color: #ffffff;
            width: 100%;

            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ff7b7b;
            font-size: 12px;
            text-align: center;
            line-height: 1.4;

            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #ddd;
            text-align: center;
        }

        .iframe-section {

            padding: 5px;

            overflow: hidden;

        }

        .payment-iframe {

            height: 1000px;
            border: none;
            background: #fff;
        }

        .iframe-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 1000px;

            padding: 40px;

        .iframe-placeholder svg {

            height: 60px;
            margin-bottom: 15px;

        }

        .iframe-placeholder p {

        .discount-badge-card::before {

            color: white;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 5px;
            border-radius: 3px;
            z-index: 2;
        }

<div class="payment-container">
    <div class="payment-title">
        <h1>Выберите товар из списка</h1>
        <p>Кликните по карточке для выбора услуги</p>
    </div>

    <!-- Сетка тарифов -->
    <div class="price-buttons-grid" id="priceButtonsGrid">
        <div style="text-align: center; color: #888; grid-column: 1/-1;">Загрузка тарифов...</div>
    </div>

    <!-- НОВЫЙ БЛОК: СПОСОБЫ ОПЛАТЫ (CloudTips + Ozon Банк + YooMoney) -->
    <div class="payment-methods-section">
        <div class="methods-title">
            Способ оплаты
        </div>
        <div class="methods-grid" id="paymentMethodsGrid">
            <!-- динамически через js, но также можно прописать резерв -->
        </div>
        <div id="dynamicPaymentWarning" class="card-warn">После оплаты обязательно оповестите продавца!</div>
    </div>

    <!-- Блок с iframe и плашками -->
    <div class="iframe-section">
        <div class="iframe-title">
            🔒 Безопасная оплата
            <!-- Динамическая плашка будет здесь обновляться в зависимости от метода -->
        </div>
        <div class="iframe-wrapper" id="iframeWrapper">
            <div class="iframe-placeholder" id="iframePlaceholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-linecap="round"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor"/>
                </svg>
                <p>Выберите тариф для оплаты</p>
                <small>Нажмите на любую карточку выше</small>
            </div>
            <iframe id="paymentIframe" class="payment-iframe" style="display: none;" src="about:blank"></iframe>
        </div>
    </div>
</div>

<script>
// Данные из price.js (ожидаем глобальный pricelist)
let currentSelectedIndex = null;
let currentPaymentMethod = 'cloudtips';   // 'cloudtips', 'ozonbank' или 'yoomoney'

// Настройки доступности и ссылки для Ozon
const OZON_COMMON_LINK = 'https://finance.ozon.ru/apps/sbp/ozonbankpay/000019cbd69-fa97-748c-98dc-bdafc336be0c';
const OZON_UNAVAILABLE = true;  // true = временно недоступно, отключаем выбор и показываем плашку

// Настройки для YooMoney (аналог Ozon)
const YOOMONEY_COMMON_LINK = 'https://yoomoney.ru/transfer/quickpay?requestId=2b7a8f3c-9d4e-4a1f-8c2d-5e6f7g8h9i0j'; // Универсальная ссылка на перевод/кошелек
const YOOMONEY_UNAVAILABLE = true; // Доступен по умолчанию (можно выключить при необходимости)

// Данные методов оплаты с иконками
const paymentMethods = [
    {
        id: 'cloudtips',
        name: 'CloudTips',
        icon: './content/svg/pay-cloudtips.svg',
        available: true,
        getLink: (selectedTariff) => {
            if (!selectedTariff) return '#';
            return selectedTariff.pay_link;
        },
        warningText: 'После оплаты обязательно оповестите продавца!',
        warningStyle: { background: '#660000', border: '1px solid #ff7b7b', color: '#ffffff' }
    },
    {
        id: 'ozonbank',
        name: 'Ozon Банк',
        icon: './content/svg/pay-ozonbank.svg',
        available: !OZON_UNAVAILABLE,   // false = недоступно
        getLink: () => OZON_COMMON_LINK,
        warningText: '💰 Сумму нужно указать вручную<br>После оплаты обязательно оповестите продавца!',
        warningStyle: { background: '#226622', border: '1px solid #d7fe7b', color: '#f0f0f0' }
    },
    {
        id: 'yoomoney',
        name: 'YooMoney',
        icon: './content/svg/pay-yoomoney.svg',
        available: !YOOMONEY_UNAVAILABLE,
        getLink: () => YOOMONEY_COMMON_LINK,
        warningText: '💰 Укажите точную сумму к оплате вручную<br>После оплаты обязательно оповестите продавца!',
        warningStyle: { background: '#226699', border: '1px solid #88ddff', color: '#ffffff' }
    }
];

// Функция для вычисления старой цены
function getOriginalPrice(currentPrice, discountPercent) {
    if (!discountPercent || discountPercent === 0) return null;
    const priceMatch = currentPrice.match(/(\d+)/);
    if (!priceMatch) return null;
    const price = parseInt(priceMatch[0]);
    const discountedPrice = Math.round(price * (1 - discountPercent / 100));
    return discountedPrice + ' ' + currentPrice.replace(/\d+/, '').trim();
}

// Отображение карточек тарифов
function renderPriceCards() {
    const container = document.getElementById('priceButtonsGrid');
    if (!container) return;
    
    container.innerHTML = '';
    if (!window.pricelist || !window.pricelist.length) {
        container.innerHTML = '<div style="text-align: center; color: #888; grid-column: 1/-1;">Ошибка загрузки тарифов</div>';
        return;
    }
    
    window.pricelist.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'price-card';
        if (currentSelectedIndex === index) {
            card.classList.add('active');
        }
        
        const discount = item.item_discount || 0;
        const hasDiscount = discount > 0;
        
        let priceHtml = '';
        if (hasDiscount) {
            const originalPrice = getOriginalPrice(item.item_price, discount);
            priceHtml = `
                <div class="price-amount-with-discount">
                    <span class="price-old">${item.item_price}</span>
                </div>
                <span class="price-new">${originalPrice || item.item_price}</span>
            `;
        } else {
            priceHtml = `<div class="price-amount">${item.item_price}</div>`;
        }
        
        card.innerHTML = `
            ${hasDiscount ? `<div class="discount-badge-card">${discount}%</div>` : ''}
            ${priceHtml}
            <div class="price-term">${item.item_term}</div>
        `;
        
        card.addEventListener('click', () => selectTariff(index));
        container.appendChild(card);
    });
}

// Выбор тарифа (обновляем iframe с учётом текущего метода оплаты)
function selectTariff(index) {
    if (currentSelectedIndex === index) return;
    currentSelectedIndex = index;
    
    // обновляем активный класс карточек
    const cards = document.querySelectorAll('.price-card');
    cards.forEach((card, i) => {
        if (i === index) card.classList.add('active');
        else card.classList.remove('active');
    });
    
    // перезагружаем iframe, используя текущий способ оплаты
    updateIframeByCurrentMethod();
}

// Получить ссылку в зависимости от выбранного тарифа и метода
function getPaymentUrlByMethod() {
    if (currentSelectedIndex === null || currentSelectedIndex === undefined) return null;
    if (!window.pricelist || !window.pricelist[currentSelectedIndex]) return null;
    
    const selectedTariff = window.pricelist[currentSelectedIndex];
    const method = paymentMethods.find(m => m.id === currentPaymentMethod);
    
    if (!method) return null;
    if (!method.available) return null;  // если недоступно – не даём ссылку
    
    if (method.id === 'cloudtips') {
        return selectedTariff.pay_link;
    } 
    else if (method.id === 'ozonbank') {
        return method.getLink(selectedTariff);
    }
    else if (method.id === 'yoomoney') {
        // Для YooMoney также единая ссылка (можно передавать сумму, но здесь просто открываем форму перевода)
        return method.getLink(selectedTariff);
    }
    return null;
}

// Обновить iframe и плашки (предупреждения)
function updateIframeByCurrentMethod() {
    const iframe = document.getElementById('paymentIframe');
    const placeholder = document.getElementById('iframePlaceholder');
    const warningDiv = document.getElementById('dynamicPaymentWarning');
    
    if (!iframe || !placeholder) return;
    
    const method = paymentMethods.find(m => m.id === currentPaymentMethod);
    const isMethodAvailable = method ? method.available : false;
    
    // Если нет выбранного тарифа
    if (currentSelectedIndex === null) {
        iframe.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor"/>
            </svg>
            <p>Выберите тариф для оплаты</p>
            <small>Нажмите на любую карточку выше</small>
        `;
        // обновляем текст плашки в зависимости от метода
        updateWarningText(method, isMethodAvailable);
        return;
    }
    
    // Если метод недоступен (Ozon или YooMoney выключены)
    if (!isMethodAvailable) {
        iframe.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="#ff8888" stroke-width="1.5">
                <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor"/>
                <circle cx="12" cy="12" r="9" stroke="currentColor"/>
            </svg>
            <p style="color:#ff9e9e;">⚠️ ${method.name} временно недоступен</p>
            <small>Пожалуйста, выберите CloudTips или другой способ оплаты</small>
        `;
        updateWarningText(method, false);
        return;
    }
    
    // Если метод доступен и выбран тариф
    const paymentUrl = getPaymentUrlByMethod();
    if (!paymentUrl) {
        iframe.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.innerHTML = `<p>❌ Не удалось сформировать ссылку оплаты</p>`;
        return;
    }
    
    // показываем iframe с платежкой
    iframe.style.display = 'block';
    placeholder.style.display = 'none';
    iframe.src = paymentUrl;
    
    // обновляем текст плашки (после оплаты)
    updateWarningText(method, true);
}

// Обновление текста предупреждения (под заголовком iframe)
function updateWarningText(method, isAvailable) {
    const warningDiv = document.getElementById('dynamicPaymentWarning');
    if (!warningDiv) return;
    
    if (!isAvailable) {
        warningDiv.innerHTML = `${method.name} временно недоступен.`;
        warningDiv.style.background = "#662200";
        warningDiv.style.border = "1px solid #ff8844";
        warningDiv.style.color = "#ffffff";
        return;
    }
    
    // Если метод доступен, берем стандартные настройки из массива
    if (method && method.warningText) {
        warningDiv.innerHTML = method.warningText;
        warningDiv.style.display = 'none';
        warningDiv.style.background = method.warningStyle.background;
        warningDiv.style.border = method.warningStyle.border;
        warningDiv.style.color = method.warningStyle.color;
    } else {
        // fallback
        warningDiv.innerHTML = `После оплаты обязательно оповестите продавца!`;
        warningDiv.style.background = "#660000";
        warningDiv.style.border = "1px solid #ff7b7b";
        warningDiv.style.color = "#ffffff";
    }
}

// Отрисовка кнопок способов оплаты (cloudtips.png / ozonbank.png / yoomoney.png)
function renderPaymentMethods() {
    const container = document.getElementById('paymentMethodsGrid');
    if (!container) return;
    
    container.innerHTML = '';
    paymentMethods.forEach(method => {
        const methodCard = document.createElement('div');
        methodCard.className = 'method-card';
        if (!method.available) {
            methodCard.classList.add('disabled-method');
        }
        if (currentPaymentMethod === method.id && method.available) {
            methodCard.classList.add('active-method');
        }
        
        const iconPath = method.icon; // cloudtips.png / ozonbank.png / yoomoney.png
        
        methodCard.innerHTML = `
            <img class="method-icon ${method.name}" src="${iconPath}" alt="${method.name}" onerror="this.style.display='none'">
        `;
        
        if (method.available) {
            methodCard.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentPaymentMethod === method.id) return;
                currentPaymentMethod = method.id;
                // обновляем активный класс у методов
                document.querySelectorAll('.method-card').forEach(card => card.classList.remove('active-method'));
                methodCard.classList.add('active-method');
                // перезагружаем iframe с новым методом (если тариф выбран)
                updateIframeByCurrentMethod();
            });
        } else {
            methodCard.style.cursor = 'not-allowed';
            methodCard.addEventListener('click', (e) => {
                e.preventDefault();
                // легкий нотификационный эффект
                const warnDiv = document.getElementById('dynamicPaymentWarning');
                if (warnDiv) {
                    warnDiv.innerHTML = `${method.name} временно недоступен.`;
                    warnDiv.style.display = "block";
                    warnDiv.style.background = "#202020";
                    setTimeout(() => {
                        if (currentPaymentMethod === 'cloudtips') updateWarningText(paymentMethods.find(m => m.id === 'cloudtips'), true);
                        else updateWarningText(paymentMethods.find(m => m.id === currentPaymentMethod), true);
                    }, 3000);
                }
            });
        }
        
        container.appendChild(methodCard);
    });
}

// При загрузке страницы инициализация
document.addEventListener('DOMContentLoaded', () => {
    // Проверяем наличие pricelist из price.js
    if (typeof window.pricelist === 'undefined') {
        console.warn("price.js не загружен? создаём заглушку");
        // Для демонстрации можно создать тестовые данные, но оставим как есть
    }
    
    // отобразить методы оплаты
    renderPaymentMethods();
    // отрисовать тарифы
    renderPriceCards();
    
    // если есть тарифы, автоматически выбираем первый
    if (window.pricelist && window.pricelist.length > 0) {
        currentSelectedIndex = 0;
        // визуально выделим карточку
        renderPriceCards(); // перерисовка с активным первым
        // обновляем iframe с учётом метода по умолчанию (cloudtips)
        updateIframeByCurrentMethod();
    } else {
        const placeholderDiv = document.getElementById('iframePlaceholder');
        if(placeholderDiv) placeholderDiv.innerHTML = `<p>⚠️ Нет доступных тарифов</p>`;
    }
    
    // доп. защита: если метод озона или yoomoney изначально недоступен, предупреждение при клике уже обработано
});
</script>
